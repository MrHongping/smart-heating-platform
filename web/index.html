<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>智能温控加热台</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>智能温控加热台</h1>
        
        <!-- 温度显示区域 -->
        <div class="temperature-section">
            <div class="temp-card">
                <h2>当前温度</h2>
                <div class="temp-value" id="current-temp">--.- °C</div>
            </div>
            <div class="temp-card">
                <h2>目标温度</h2>
                <div class="temp-value" id="target-temp">--.- °C</div>
                <div class="temp-control">
                    <button class="temp-btn" id="temp-down">-</button>
                    <input type="number" id="temp-input" min="0" max="400" step="1">
                    <button class="temp-btn" id="temp-up">+</button>
                    <button class="set-btn" id="set-temp-btn">设置</button>
                </div>
            </div>
        </div>
        
        <!-- 系统状态区域 -->
        <div class="status-section">
            <div class="status-card">
                <h2>系统状态</h2>
                <div class="status-item">
                    <span>加热状态:</span>
                    <span id="heating-status">--</span>
                </div>
                <div class="status-item">
                    <span>PID输出:</span>
                    <span id="pid-output">-- %</span>
                </div>
                <div class="status-item">
                    <span>系统运行:</span>
                    <span id="system-status">--</span>
                </div>
            </div>
        </div>
        
        <!-- PID参数设置区域 -->
        <div class="pid-section">
            <h2>PID参数设置</h2>
            <div class="pid-controls">
                <div class="pid-item">
                    <label for="pid-kp">Kp:</label>
                    <input type="number" id="pid-kp" min="0" max="100" step="0.1">
                </div>
                <div class="pid-item">
                    <label for="pid-ki">Ki:</label>
                    <input type="number" id="pid-ki" min="0" max="10" step="0.01">
                </div>
                <div class="pid-item">
                    <label for="pid-kd">Kd:</label>
                    <input type="number" id="pid-kd" min="0" max="200" step="1">
                </div>
                <button class="set-btn" id="set-pid-btn">设置PID</button>
            </div>
        </div>
        
        <!-- 温度曲线控制 -->
        <div class="curve-section">
            <h2>温度曲线控制</h2>
            <div class="curve-controls">
                <div class="curve-item">
                    <label for="curve-name">曲线名称:</label>
                    <input type="text" id="curve-name" value="reflow">
                </div>
                <div class="curve-item">
                    <label for="curve-time">时间(s):</label>
                    <input type="number" id="curve-time" value="0" step="10">
                    <label for="curve-temp">温度(°C):</label>
                    <input type="number" id="curve-temp" value="25" step="5">
                    <button class="set-btn" id="add-curve-point">添加点</button>
                </div>
                <div class="curve-item">
                    <label>曲线点:</label>
                    <ul id="curve-points-list"></ul>
                </div>
                <div class="curve-buttons">
                    <button class="set-btn" id="upload-curve">上传曲线</button>
                    <button class="set-btn" id="start-curve">开始曲线</button>
                    <button class="set-btn" id="stop-curve">停止曲线</button>
                </div>
            </div>
        </div>
        
        <!-- 温度曲线图 -->
        <div class="chart-section">
            <h2>温度趋势</h2>
            <div class="chart-container">
                <canvas id="temp-chart"></canvas>
            </div>
        </div>
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
